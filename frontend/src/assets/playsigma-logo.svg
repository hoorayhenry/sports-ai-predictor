<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <defs>
    <linearGradient id="sigmaBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6cc4"/>
      <stop offset="100%" stop-color="#1557a0"/>
    </linearGradient>
    <linearGradient id="sigmaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6cc4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1557a0" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon: interlocked P loops (44×44 centered in 0-48 space) -->
  <!-- Upper loop — larger rounded rectangle forming P top -->
  <g filter="url(#softGlow)">
    <!-- Upper loop outer stroke (white border effect) -->
    <path d="M10 8 Q10 4 14 4 L38 4 Q44 4 44 10 L44 28 Q44 34 38 34 L22 34 Q20 34 20 32 L20 22 Q20 20 22 20 L36 20 Q38 20 38 22 L38 26 Q38 28 36 28 L26 28 Q24 28 24 26 L24 14 Q24 12 26 12 L38 12"
          stroke="rgba(255,255,255,0.9)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Lower loop outer stroke -->
    <path d="M20 32 Q20 34 22 34 L24 34 Q26 34 26 36 L26 46 Q26 52 20 52 L14 52 Q8 52 8 46 L8 36 Q8 30 14 30 L20 30"
          stroke="rgba(255,255,255,0.9)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Upper loop blue fill -->
    <path d="M10 8 Q10 4 14 4 L38 4 Q44 4 44 10 L44 28 Q44 34 38 34 L22 34 Q20 34 20 32 L20 22 Q20 20 22 20 L36 20 Q38 20 38 22 L38 26 Q38 28 36 28 L26 28 Q24 28 24 26 L24 14 Q24 12 26 12 L38 12"
          stroke="url(#sigmaBlue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Lower loop blue fill -->
    <path d="M20 32 Q20 34 22 34 L24 34 Q26 34 26 36 L26 46 Q26 52 20 52 L14 52 Q8 52 8 46 L8 36 Q8 30 14 30 L20 30"
          stroke="url(#sigmaBlue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="37" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f0f4ff" letter-spacing="-0.4">Play</text>
  <text x="109" y="37" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#1a6cc4" letter-spacing="0.5">Sigma</text>
</svg>
