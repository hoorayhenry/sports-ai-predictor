<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon background pill -->
  <rect x="0" y="4" width="32" height="32" rx="9" fill="url(#glowGrad)"/>
  <rect x="1" y="5" width="30" height="30" rx="8" fill="#0d1527" stroke="url(#iconGrad)" stroke-width="1.2"/>

  <!-- Play triangle -->
  <polygon points="11,13 11,27 24,20" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="38" y="26" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f0f4ff" letter-spacing="-0.3">Play</text>
  <text x="81" y="26" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#818cf8" letter-spacing="1">Intel</text>
</svg>
