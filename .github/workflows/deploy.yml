name: Build → ECR → Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION:    us-east-2
  ECR_REGISTRY:  594474085976.dkr.ecr.us-east-2.amazonaws.com
  BACKEND_REPO:  ai-prediction/backend
  FRONTEND_REPO: ai-prediction/frontend

jobs:
  # ────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (short commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug credentials (lengths only, no values)
        run: |
          echo "AWS_ACCESS_KEY_ID length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY length: ${#AWS_SECRET_ACCESS_KEY}"
          echo "AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
          cache-to:   type=inline

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          build-args: VITE_API_URL=/api/v1
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
          cache-to:   type=inline

  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            ECR_REGISTRY="594474085976.dkr.ecr.us-east-2.amazonaws.com"
            REPO_URL="https://${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git"

            # ── Clone or update repo ────────────────────────────────
            if [ -d $HOME/sports-ai/.git ]; then
              git -C $HOME/sports-ai remote set-url origin "$REPO_URL"
              git -C $HOME/sports-ai pull origin main
            else
              git clone "$REPO_URL" $HOME/sports-ai
            fi

            cd $HOME/sports-ai

            # ── ECR login ───────────────────────────────────────────
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            AWS_DEFAULT_REGION="us-east-2" \
            aws ecr get-login-password --region us-east-2 \
              | docker login --username AWS --password-stdin \
                594474085976.dkr.ecr.us-east-2.amazonaws.com

            # ── Pull new images ─────────────────────────────────────
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml pull

            # ── Copy frontend static files into shared volume ───────
            docker run --rm \
              -v sports-ai_frontend_dist:/shared \
              ${ECR_REGISTRY}/ai-prediction/frontend:${IMAGE_TAG} \
              sh -c "cp -r /dist/. /shared/ && echo 'Frontend files updated'"

            # ── Start/restart — 2 backend replicas + nginx ──────────
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --scale backend=2

            docker compose -f docker-compose.prod.yml ps
            echo "✅ Deploy complete — image tag: ${IMAGE_TAG}"
