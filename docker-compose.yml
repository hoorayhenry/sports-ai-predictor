version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/sports_ai.db
      DATABASE_URL_SYNC: sqlite:////data/sports_ai.db
    volumes:
      - db_data:/data
      - ml_models:/app/ml/saved
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles: ["ssl"]   # only runs when: docker compose --profile ssl up
    entrypoint: >
      sh -c 'certbot certonly --webroot -w /var/www/certbot
      --email ${CERTBOT_EMAIL:-admin@example.com}
      --agree-tos --no-eff-email
      -d ${DOMAIN:-localhost} && echo SSL OK'

volumes:
  db_data:
  ml_models:
  certbot_certs:
  certbot_www:
