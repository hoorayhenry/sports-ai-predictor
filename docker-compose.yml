version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data_vol
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./sports.db
      DATABASE_URL_SYNC: sqlite:///./sports.db
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
